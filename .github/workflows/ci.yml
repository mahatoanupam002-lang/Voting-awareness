name: CI

on:
  push:
    branches: [main, claude/**]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: node scripts/generate-sitemap.mjs
      - name: No uncommitted changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git status --short
            exit 1
          fi
