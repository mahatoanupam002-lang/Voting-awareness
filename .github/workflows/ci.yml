name: CI — Lint, Validate, and Build Check

on:
  push:
    branches: [main, claude/**]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint HTML
        run: npx htmlhint public/*.html || true

      - name: Lint CSS
        run: |
          if ls public/*.css 1>/dev/null 2>&1; then
            npx stylelint public/*.css
          fi

      - name: Validate site
        run: node scripts/validate.mjs || true

      - name: Generate sitemap
        run: node scripts/generate-sitemap.mjs

      - name: Check for uncommitted changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "⚠ Uncommitted changes detected after build:"
            git status --short
            exit 1
          fi
