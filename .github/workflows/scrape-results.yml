name: Scrape ECI Constituency Results

on:
  schedule:
    # 04:00, 10:00, 16:00 UTC  (09:30, 15:30, 21:30 IST)
    - cron: '0 4,10,16 * * *'
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions UI

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Scrape ECI results
        run: node scripts/scrape-results.mjs

      - name: Commit and push if data changed
        run: |
          git config user.name  "Bengal Reader Bot"
          git config user.email "bot@bengal-reader.app"
          git add constituencies.html
          if git diff --staged --quiet; then
            echo "✓ No new constituency data this run"
          else
            CHANGES=$(git diff --staged --stat | tail -1)
            git commit -m "data: auto-update constituency results $(date -u +%Y-%m-%dT%H:%M:%SZ) — ${CHANGES}"
            git push
            echo "✓ Constituency data updated — Vercel will auto-deploy"
          fi
