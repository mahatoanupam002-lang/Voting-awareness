name: Scrape ECI Constituency Results

on:
  schedule:
    # 04:00, 10:00, 16:00 UTC  (09:30, 15:30, 21:30 IST)
    - cron: '0 4,10,16 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force re-scrape all seats (including already-verified ones)'
        required: false
        default: 'false'
        type: boolean
      reset:
        description: 'Reset all seats to unverified before scraping (clears stale data)'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write
  issues: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js 24
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Scrape ECI results
        id: scrape
        run: |
          FLAGS=""
          if [[ "${{ github.event.inputs.reset }}" == "true" ]]; then
            FLAGS="--reset"
          elif [[ "${{ github.event.inputs.force }}" == "true" ]]; then
            FLAGS="--force"
          fi
          echo "Running: node scripts/scrape-results.mjs $FLAGS"
          node scripts/scrape-results.mjs $FLAGS

      - name: Regenerate sitemap
        run: node scripts/generate-sitemap.mjs

      - name: Run validation
        run: node scripts/validate.mjs || true

      - name: Commit and push if data changed
        run: |
          git config user.name  "Bengal Reader Bot"
          git config user.email "bot@bengal-reader.app"
          git add public/data/constituencies.json public/sitemap.xml
          if git diff --staged --quiet; then
            echo "✓ No new constituency data this run"
          else
            CHANGES=$(git diff --staged --stat | tail -1)
            git commit -m "data: auto-update constituencies.json $(date -u +%Y-%m-%dT%H:%M:%SZ) — ${CHANGES}"
            git push
            echo "✓ Constituency data updated — Vercel will auto-deploy"
          fi

      - name: Alert on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Constituency scrape failed: ${new Date().toISOString().slice(0,10)}`;
            const body = [
              '## Constituency scrape job failed',
              '',
              `**Run:** ${context.runId}`,
              `**Workflow:** ${context.workflow}`,
              '',
              `[View run logs](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
            ].join('\n');
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'scrape-failure',
              state: 'open',
            });
            if (issues.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['scrape-failure'],
              });
            }
