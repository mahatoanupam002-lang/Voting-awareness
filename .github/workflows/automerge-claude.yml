name: Auto-Merge Claude Branches

# Fires on every push to any claude/* branch.
# Squash-merges the branch directly into main via git — no PR needed.
# This means every commit Claude pushes lands on main automatically,
# and Vercel auto-deploys within ~30 seconds.

on:
  push:
    branches:
      - 'claude/**'

permissions:
  contents: write

jobs:
  automerge:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout main
        uses: actions/checkout@v5
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "Bengal Reader Bot"
          git config user.email "bot@bengal-reader.app"

      - name: Squash-merge claude branch into main
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          git fetch origin "$BRANCH"

          # Squash all commits from the claude branch on top of main.
          # -X theirs: auto-resolve any conflict by preferring the claude branch.
          git merge --squash -X theirs "origin/$BRANCH"

          # Commit only if there are staged changes
          if git diff --cached --quiet; then
            echo "Nothing to merge — branch is already up to date with main"
          else
            TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
            git commit -m "auto: squash-merge $BRANCH → main ($TIMESTAMP)"
            git push origin main
            echo "✓ Pushed to main — Vercel will auto-deploy"
          fi
