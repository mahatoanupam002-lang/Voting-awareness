name: Scrape MLA Affidavits

on:
  schedule:
    # 02:00 UTC daily  (07:30 IST)
    - cron: '0 2 * * *'
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions UI

permissions:
  contents: write
  issues: write

jobs:
  scrape-mlas:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js 20
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Scrape MLA affidavits from ECI
        id: scrape
        run: node scripts/scrape-mlas.mjs

      - name: Run auto-update pipeline
        run: node scripts/auto-update-system.mjs || true

      - name: Run validation
        run: node scripts/validate.mjs || true

      - name: Commit and push if data changed
        run: |
          git config user.name  "Bengal Reader Bot"
          git config user.email "bot@bengal-reader.app"
          git add public/data/mlas.json public/data/meta.json public/data/assets-history/ public/data/reports/ || true
          if git diff --staged --quiet; then
            echo "✓ No new MLA data this run"
          else
            CHANGES=$(git diff --staged --stat | tail -1)
            git commit -m "data: auto-update MLA records $(date -u +%Y-%m-%dT%H:%M:%SZ) — ${CHANGES}"
            git push
            echo "✓ MLA data updated — Vercel will auto-deploy"
          fi

      - name: Alert on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `MLA scrape failed: ${new Date().toISOString().slice(0,10)}`;
            const body = [
              '## MLA affidavit scrape job failed',
              '',
              `**Run:** ${context.runId}`,
              `**Workflow:** ${context.workflow}`,
              '',
              `[View run logs](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
            ].join('\n');
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              labels: 'scrape-failure',
              state:  'open',
            });
            if (issues.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                title,
                body,
                labels: ['scrape-failure'],
              });
            }
