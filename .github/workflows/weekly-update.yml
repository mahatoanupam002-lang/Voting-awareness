name: Auto-Update (Every 6 Hours)

on:
  schedule:
    # Every hour
    - cron: '0 * * * *'
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions UI

permissions:
  contents: write
  issues: write

jobs:
  auto-update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js 20
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run auto-update script
        id: update
        run: node scripts/update.mjs

      - name: Regenerate sitemap
        run: node scripts/generate-sitemap.mjs

      - name: Regenerate RSS feed
        run: node scripts/generate-rss.mjs

      - name: Run validation
        run: node scripts/validate.mjs || true

      - name: Commit and push if data changed
        run: |
          git config user.name  "Bengal Reader Bot"
          git config user.email "bot@bengal-reader.app"
          git add public/data/ public/sitemap.xml public/rss.xml
          if git diff --staged --quiet; then
            echo "✓ No data changes this run"
          else
            CHANGES=$(git diff --staged --stat | tail -1)
            git commit -m "auto: data refresh $(date -u +%Y-%m-%dT%H:%M:%SZ) — ${CHANGES}"
            git push
            echo "✓ Updated data pushed — Vercel will auto-deploy"
          fi

      - name: Alert on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Auto-update failed: ${new Date().toISOString().slice(0,10)}`;
            const body = [
              '## Auto-update job failed',
              '',
              `**Run:** ${context.runId}`,
              `**Workflow:** ${context.workflow}`,
              `**Branch:** ${context.ref}`,
              '',
              `[View run logs](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
            ].join('\n');
            // Check for existing open alert issue to avoid duplicates
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'auto-update-failure',
              state: 'open',
            });
            if (issues.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['auto-update-failure'],
              });
            }
