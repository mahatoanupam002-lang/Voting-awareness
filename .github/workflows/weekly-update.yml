name: Auto-Update (Every 6 Hours)

on:
  schedule:
    # Every 6 hours: 00:00, 06:00, 12:00, 18:00 UTC
    - cron: '0 */6 * * *'
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions UI

permissions:
  contents: write

jobs:
  auto-update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run auto-update script
        run: node scripts/update.mjs

      - name: Regenerate sitemap
        run: node scripts/generate-sitemap.mjs

      - name: Run validation
        run: node scripts/validate.mjs || true

      - name: Commit and push if data changed
        run: |
          git config user.name  "Bengal Reader Bot"
          git config user.email "bot@bengal-reader.app"
          git add public/data/ public/sitemap.xml
          if git diff --staged --quiet; then
            echo "✓ No data changes this run"
          else
            CHANGES=$(git diff --staged --stat | tail -1)
            git commit -m "auto: data refresh $(date -u +%Y-%m-%dT%H:%M:%SZ) — ${CHANGES}"
            git push
            echo "✓ Updated data pushed — Vercel will auto-deploy"
          fi
